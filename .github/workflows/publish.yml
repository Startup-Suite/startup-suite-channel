name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install

      - name: Publish to npm (Trusted Publishing)
        run: |
          # Remove the token-based auth so npm uses OIDC instead
          sed -i 's/\/\/registry.npmjs.org\/:_authToken=.*//' "$NPM_CONFIG_USERCONFIG"
          npm publish --access public --provenance
