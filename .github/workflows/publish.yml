name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm with OIDC support
        # Node 22 bundles npm 10.9, which predates OIDC trusted publishing
        # (requires 11.5.1+). `npm@latest` (>=11.6.3) currently fails on the
        # runner with MODULE_NOT_FOUND: promise-retry. Pin to a known-good
        # version that has OIDC and installs cleanly.
        run: npm install -g npm@11.5.2 && npm --version

      - run: npm install

      - name: Build plugin bundle
        run: npm run build

      - name: Verify packaged entrypoints exist
        run: |
          test -f dist/index.js
          test -f dist/setup-entry.js

      - name: Publish with Trusted Publishing
        run: |
          echo "registry=https://registry.npmjs.org/" > ~/.npmrc
          npm publish --access public
