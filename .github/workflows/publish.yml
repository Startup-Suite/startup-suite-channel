name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Print npm version
        # Node 22 bundles npm 10.9+, which already supports OIDC trusted
        # publishing. Self-upgrading to `npm@latest` has been flaky on the
        # runner (MODULE_NOT_FOUND for promise-retry), so we just use the
        # bundled version.
        run: npm --version

      - run: npm install

      - name: Build plugin bundle
        run: npm run build

      - name: Verify packaged entrypoints exist
        run: |
          test -f dist/index.js
          test -f dist/setup-entry.js

      - name: Publish with Trusted Publishing
        run: |
          echo "registry=https://registry.npmjs.org/" > ~/.npmrc
          npm publish --access public
