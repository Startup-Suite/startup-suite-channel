name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - name: Publish with Trusted Publishing
        run: |
          echo "registry=https://registry.npmjs.org/" > ~/.npmrc
          npm publish --access public
